<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UNO Multiplayer</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#0f172a;
color:white;
overflow:hidden;
}

/* LOBBY */

#lobby{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
}

input{
padding:10px;
border-radius:6px;
border:none;
width:220px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6366f1;
color:white;
}

/* GAME */

#game{
display:none;
height:100vh;
width:100vw;
position:relative;
}

/* TABLE */

#table{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:360px;
height:230px;
background:#14532d;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
}

#tableCard{
width:95px;
height:135px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
}

/* PLAYERS */

#playersCircle{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:700px;
height:700px;
pointer-events:none;
}

.playerSeat{
position:absolute;
background:#1e293b;
padding:6px 10px;
border-radius:8px;
display:flex;
align-items:center;
gap:6px;
}

.avatar{
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.active-turn{
border:2px solid #facc15;
box-shadow:0 0 10px #facc15;
}

/* HAND */

#hand{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
height:200px;
width:700px;
}

/* CARDS */

.card{
width:95px;
height:135px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:24px;
cursor:pointer;
position:absolute;
transition:.25s;
}

.red{background:#ef4444}
.blue{background:#3b82f6}
.green{background:#22c55e}
.yellow{background:#facc15;color:black}
.wild{background:black}

.card:hover{
transform:translateY(-12px);
}

/* DEAL ANIMATION */

.deal{
animation:deal .35s ease;
}

@keyframes deal{
from{
transform:translateY(-200px) scale(.3);
opacity:0;
}
to{
transform:translateY(0) scale(1);
opacity:1;
}
}

/* PLAY ANIMATION */

.play{
animation:play .35s forwards;
}

@keyframes play{
to{
transform:translate(-200px,-260px) scale(.6);
opacity:0;
}
}

/* STACK ANIMATION */

.stack-fly{
position:absolute;
top:50%;
left:50%;
width:90px;
height:130px;
border-radius:10px;
animation:stackFly .6s ease forwards;
}

@keyframes stackFly{
from{
transform:translate(-50%,-50%) scale(.3);
opacity:0;
}
to{
transform:translate(-50%,-200%) scale(1);
opacity:1;
}
}

</style>
</head>

<body>

<!-- LOBBY -->

<div id="lobby">

<h2>UNO Multiplayer</h2>

<input id="username" placeholder="Your Name">
<input id="room" placeholder="Room Code">

<button onclick="join()">Join Game</button>
<button onclick="startGame()">Start Game</button>

</div>

<!-- GAME -->

<div id="game">

<div id="table">
<div id="tableCard"></div>
</div>

<div id="playersCircle"></div>

<div id="hand"></div>

</div>

<script>

let socket
let username

function wsURL(room){
let protocol = location.protocol === "https:" ? "wss://" : "ws://"
return protocol + location.host + "/ws/game/" + room + "/"
}

function join(){

username=document.getElementById("username").value
let room=document.getElementById("room").value

socket=new WebSocket(wsURL(room))

socket.onopen=()=>{

socket.send(JSON.stringify({
type:"join",
username:username
}))

document.getElementById("lobby").style.display="none"
document.getElementById("game").style.display="block"

}

socket.onmessage=(e)=>{

let data=JSON.parse(e.data)

if(data.type==="players_update"){
renderPlayers(data.players)
}

if(data.type==="state"){
renderState(data)
}

}

}

function startGame(){

socket.send(JSON.stringify({
type:"start"
}))

}

/* AVATAR */

function avatar(name){

let colors=["#ef4444","#3b82f6","#22c55e","#f59e0b"]

let c=colors[name.length % colors.length]

return `<div class="avatar" style="background:${c}">${name[0]}</div>`

}

/* PLAYERS */

function renderPlayers(players){

let container=document.getElementById("playersCircle")
container.innerHTML=""

let radius=280
let center=350

players.forEach((p,i)=>{

let angle=(i/players.length)*2*Math.PI

let x=center+radius*Math.cos(angle)
let y=center+radius*Math.sin(angle)

let seat=document.createElement("div")

seat.className="playerSeat"
seat.style.left=x+"px"
seat.style.top=y+"px"

seat.innerHTML=avatar(p)+" "+p

container.appendChild(seat)

})

}

/* STATE */

function renderState(data){

renderTable(data.table)
renderHand(data.hand)
highlightTurn(data.turn)

if(data.pending>0){
stackAnimation("+"+data.pending)
}

}

function renderTable(card){

let el=document.getElementById("tableCard")
let color=card.color.toLowerCase()

el.className="card "+color
el.innerText=card.value

}

/* HAND */

function renderHand(cards){

let container=document.getElementById("hand")
container.innerHTML=""

let spread=35
let start=-(cards.length-1)*spread/2

cards.forEach((card,i)=>{

let el=document.createElement("div")

let color=card.color.toLowerCase()

el.className="card deal "+color
el.innerText=card.value

let angle=start+i*spread

el.style.left=(i*50)+"px"
el.style.transform=`rotate(${angle}deg)`

el.onclick=(e)=>play(card,e)

container.appendChild(el)

})

}

/* PLAY */

function play(card,e){

let el=e.target
el.classList.add("play")

setTimeout(()=>{

socket.send(JSON.stringify({
type:"play",
card:card
}))

},250)

}

/* TURN */

function highlightTurn(turn){

document.querySelectorAll(".playerSeat")
.forEach(p=>p.classList.remove("active-turn"))

document.querySelectorAll(".playerSeat")
.forEach(p=>{
if(p.innerText.includes(turn)){
p.classList.add("active-turn")
}
})

}

/* STACK */

function stackAnimation(value){

let card=document.createElement("div")

card.className="card stack-fly wild"
card.innerText=value

document.body.appendChild(card)

setTimeout(()=>card.remove(),600)

}

</script>

</body>
</html>
