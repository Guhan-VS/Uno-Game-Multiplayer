<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UNO Multiplayer</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
overflow:hidden;
}

/* lobby */

#lobby{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
}

input{
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6366f1;
color:white;
}

/* game */

#game{
display:none;
height:100vh;
width:100vw;
position:relative;
}

/* table */

#table{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
height:220px;
background:#14532d;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
}

/* center card */

#tableCard{
width:90px;
height:130px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
}

/* players */

.player{
position:absolute;
background:#1e293b;
padding:6px 10px;
border-radius:8px;
font-size:14px;
display:flex;
align-items:center;
gap:6px;
}

#p1{top:10px;left:50%;transform:translateX(-50%)}
#p2{left:10px;top:50%;transform:translateY(-50%)}
#p3{right:10px;top:50%;transform:translateY(-50%)}
#p4{bottom:10px;left:50%;transform:translateX(-50%)}

/* avatar */

.avatar{
width:32px;
height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* card count */

.count{
background:#374151;
padding:2px 6px;
border-radius:6px;
}

/* active turn */

.active-turn{
box-shadow:0 0 12px #facc15;
border:2px solid #facc15;
}

/* hand */

#hand{
position:absolute;
bottom:0;
width:100%;
display:flex;
justify-content:center;
padding:20px;
}

/* cards */

.card{
width:80px;
height:120px;
border-radius:10px;
margin:5px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:22px;
cursor:grab;
transition:.2s;
}

.card:hover{
transform:translateY(-10px);
}

/* colors */

.red{background:#ef4444}
.blue{background:#3b82f6}
.green{background:#22c55e}
.yellow{background:#facc15;color:black}
.wild{background:black}

/* card dealing animation */

.card-deal{
animation:deal .4s ease;
}

@keyframes deal{
from{
transform:translateY(-200px) scale(.2);
opacity:0;
}
to{
transform:translateY(0) scale(1);
opacity:1;
}
}

/* stack animation */

.stack-fly{
position:absolute;
top:50%;
left:50%;
width:80px;
height:120px;
border-radius:10px;
animation:stackFly .6s ease forwards;
}

@keyframes stackFly{
from{
transform:translate(-50%,-50%) scale(.3);
opacity:0;
}
to{
transform:translate(-50%,-200%) scale(1);
opacity:1;
}
}

/* mobile */

@media(max-width:700px){

.card{
width:60px;
height:90px;
font-size:18px;
}

}

</style>

</head>

<body>

<!-- lobby -->

<div id="lobby">

<h2>UNO Multiplayer</h2>

<input id="username" placeholder="Your Name">
<input id="room" placeholder="Room Code">

<button onclick="join()">Join Game</button>

</div>

<!-- game -->

<div id="game">

<div id="table">
<div id="tableCard"></div>
</div>

<div id="players">

<div id="p1" class="player"></div>
<div id="p2" class="player"></div>
<div id="p3" class="player"></div>
<div id="p4" class="player"></div>

</div>

<div id="hand"></div>

</div>

<script>

let socket
let username

function wsURL(room){

let protocol=location.protocol==="https:"?"wss://":"ws://"

return protocol+location.host+"/ws/game/"+room+"/"

}

function join(){

username=document.getElementById("username").value
let room=document.getElementById("room").value

socket=new WebSocket(wsURL(room))

socket.onopen=()=>{

socket.send(JSON.stringify({
type:"join",
username:username
}))

document.getElementById("lobby").style.display="none"
document.getElementById("game").style.display="block"

}

socket.onmessage=(e)=>{

let data=JSON.parse(e.data)

if(data.type==="players_update"){
renderPlayers(data.players)
}

if(data.type==="state"){
renderState(data)
}

}

}

function avatar(name){

let colors=["#ef4444","#3b82f6","#22c55e","#f59e0b"]

let c=colors[name.length%colors.length]

return `<div class="avatar" style="background:${c}">${name[0]}</div>`

}

function renderPlayers(players){

let ids=["p1","p2","p3","p4"]

players.forEach((p,i)=>{

if(ids[i]){

document.getElementById(ids[i]).innerHTML=
avatar(p)+" "+p

}

})

}

function renderState(data){

renderTable(data.table)

renderHand(data.hand)

highlightTurn(data.turn)

if(data.pending>0){
stackAnimation("+"+data.pending)
}

}

function renderTable(card){

let color=card.color.toLowerCase()

let el=document.getElementById("tableCard")

el.className="card "+color

el.innerText=card.value

}

function renderHand(cards){

let html=""

cards.forEach(c=>{

let color=c.color.toLowerCase()

html+=`
<div class="card card-deal ${color}"
draggable="true"
ondragstart='drag(event,${JSON.stringify(c)})'>
${c.value}
</div>
`

})

document.getElementById("hand").innerHTML=html

}

function drag(e,card){

e.dataTransfer.setData("card",JSON.stringify(card))

}

document.getElementById("table").ondragover=(e)=>{

e.preventDefault()

}

document.getElementById("table").ondrop=(e)=>{

e.preventDefault()

let card=JSON.parse(e.dataTransfer.getData("card"))

socket.send(JSON.stringify({
type:"play",
card:card
}))

}

function highlightTurn(turn){

document.querySelectorAll(".player")
.forEach(p=>p.classList.remove("active-turn"))

document.querySelectorAll(".player")
.forEach(p=>{
if(p.innerText.includes(turn)){
p.classList.add("active-turn")
}
})

}

function stackAnimation(value){

let card=document.createElement("div")

card.className="card stack-fly wild"

card.innerText=value

document.body.appendChild(card)

setTimeout(()=>card.remove(),600)

}

</script>

</body>
</html>
