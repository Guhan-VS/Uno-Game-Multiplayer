<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UNO Multiplayer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111827;
color:white;
text-align:center;
}

/* top bar */

.topbar{
background:#1f2937;
padding:12px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

/* players */

#players{
display:flex;
justify-content:center;
gap:15px;
margin-top:15px;
flex-wrap:wrap;
}

.player{
background:#1f2937;
padding:8px 14px;
border-radius:10px;
display:flex;
align-items:center;
gap:8px;
}

/* avatar */

.avatar{
width:32px;
height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
background:#6366f1;
}

/* table */

#tableArea{
margin-top:25px;
}

#table{
display:flex;
justify-content:center;
margin-top:10px;
}

/* cards */

.card{
width:80px;
height:120px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
cursor:pointer;
margin:5px;
transition:transform .2s;
}

.card:hover{
transform:translateY(-12px);
}

/* colors */

.red{background:#ef4444}
.blue{background:#3b82f6}
.green{background:#22c55e}
.yellow{background:#facc15;color:black}
.wild{background:black}

/* hand */

#hand{
margin-top:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

/* stack indicator */

#stack{
font-size:22px;
color:#f87171;
margin-top:5px;
}

/* turn */

#turn{
margin-top:10px;
font-weight:bold;
}

/* mobile */

@media(max-width:700px){

.card{
width:60px;
height:90px;
font-size:18px;
}

}

</style>

</head>

<body>

<div class="topbar">

<input id="username" placeholder="Name">
<input id="room" placeholder="Room">

<button onclick="join()">Join</button>
<button onclick="start()">Start</button>
<button onclick="draw()">Draw</button>
<button onclick="uno()">UNO</button>

</div>

<h3 id="turn"></h3>

<div id="players"></div>

<div id="tableArea">

<h3>Table Card</h3>

<div id="table"></div>

<div id="stack"></div>

</div>

<h3>Your Cards</h3>

<div id="hand"></div>

<script>

let socket
let drawnCard=null
let wildCard=null

function wsURL(room){

let protocol=location.protocol==="https:"?"wss://":"ws://"

return protocol+location.host+"/ws/game/"+room+"/"

}

function join(){

let room=document.getElementById("room").value
let username=document.getElementById("username").value

socket=new WebSocket(wsURL(room))

socket.onopen=()=>{

socket.send(JSON.stringify({
type:"join",
username:username
}))

}

socket.onmessage=(e)=>{

let data=JSON.parse(e.data)

if(data.type==="players_update"){
renderPlayers(data.players)
}

if(data.type==="state"){
renderState(data)
}

if(data.type==="game_over"){
alert("Loser: "+data.loser)
}

}

}

function avatar(name){

let colors=["#ef4444","#3b82f6","#22c55e","#f59e0b"]

let c=colors[name.length%colors.length]

return `<div class="avatar" style="background:${c}">
${name[0]}
</div>`

}

function renderPlayers(players){

let html=""

players.forEach(p=>{

html+=`
<div class="player">
${avatar(p)}
${p}
</div>
`

})

document.getElementById("players").innerHTML=html

}

function renderState(data){

document.getElementById("turn").innerText="Turn: "+data.turn

renderTable(data.table)

renderHand(data.hand)

document.getElementById("stack").innerText=
data.pending>0?`+${data.pending}`:""

}

function renderTable(card){

let color=card.color.toLowerCase()

let html=`<div class="card ${color}">
${card.value}
</div>`

document.getElementById("table").innerHTML=html

}

function renderHand(cards){

let html=""

cards.forEach(c=>{

let color=c.color.toLowerCase()

html+=`
<div class="card ${color}"
onclick='play(${JSON.stringify(c)})'>
${c.value}
</div>
`

})

document.getElementById("hand").innerHTML=html

}

function start(){

socket.send(JSON.stringify({type:"start"}))

}

function draw(){

socket.send(JSON.stringify({type:"draw"}))

}

function uno(){

socket.send(JSON.stringify({type:"uno"}))

}

function play(card){

socket.send(JSON.stringify({
type:"play",
card:card
}))

}

</script>

</body>
</html>
