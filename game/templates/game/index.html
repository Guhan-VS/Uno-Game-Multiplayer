<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UNO Multiplayer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
overflow:hidden;
}

/* ---------- LOBBY ---------- */

#lobby{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:15px;
}

input{
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6366f1;
color:white;
}

/* ---------- GAME ---------- */

#game{
display:none;
height:100vh;
width:100vw;
position:relative;
}

/* ---------- TABLE ---------- */

#table{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:110px;
height:160px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
}

/* ---------- PLAYERS ---------- */

#playersCircle{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:650px;
height:650px;
}

.playerSeat{
position:absolute;
background:#1e293b;
padding:6px 10px;
border-radius:8px;
}

/* ---------- HAND ---------- */

#hand{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:700px;
height:200px;
}

/* ---------- CARDS ---------- */

.card{
position:absolute;
width:90px;
height:130px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-15px) scale(1.05);
z-index:100;
}

.red{background:#ef4444}
.blue{background:#3b82f6}
.green{background:#22c55e}
.yellow{background:#facc15;color:black}
.wild{background:black}

/* ---------- PLAY ANIMATION ---------- */

.play-card{
animation:slideToTable .35s ease forwards;
}

@keyframes slideToTable{

from{
transform:translateY(0);
}

to{
transform:translate(-300px,-250px) scale(.6);
opacity:0;
}

}

/* ---------- STACK ANIMATION ---------- */

.stack-fly{
position:absolute;
top:50%;
left:50%;
width:90px;
height:130px;
border-radius:10px;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
animation:stackFly .6s ease forwards;
}

@keyframes stackFly{

from{
transform:translate(-50%,-50%) scale(.3);
opacity:0;
}

to{
transform:translate(-50%,-200%) scale(1);
opacity:1;
}

}

</style>
</head>

<body>

<!-- ---------- LOBBY ---------- -->

<div id="lobby">

<h1>UNO Multiplayer</h1>

<input id="username" placeholder="Your name">

<button onclick="createRoom()">Create Room</button>

<input id="roomInput" placeholder="Room code">

<button onclick="joinRoom()">Join Room</button>

</div>

<!-- ---------- GAME ---------- -->

<div id="game">

<h3 id="roomDisplay"></h3>

<button onclick="startGame()">Start Game</button>

<div id="playersCircle"></div>

<div id="table"></div>

<div id="hand"></div>

</div>

<script>

let socket
let room
let username

function wsURL(room){

let protocol=location.protocol==="https:"?"wss://":"ws://"

return protocol+location.host+"/ws/game/"+room+"/"

}

/* CREATE ROOM */

function createRoom(){

username=document.getElementById("username").value

room=Math.random().toString(36).substring(2,7).toUpperCase()

connect()

}

/* JOIN ROOM */

function joinRoom(){

username=document.getElementById("username").value

room=document.getElementById("roomInput").value

connect()

}

function connect(){

socket=new WebSocket(wsURL(room))

socket.onopen=()=>{

socket.send(JSON.stringify({
type:"join",
username:username
}))

document.getElementById("lobby").style.display="none"

document.getElementById("game").style.display="block"

document.getElementById("roomDisplay").innerText="Room: "+room

}

socket.onmessage=(e)=>{

let data=JSON.parse(e.data)

if(data.type==="players_update"){
renderPlayers(data.players)
}

if(data.type==="state"){
renderGame(data)
}

}

}

/* START GAME */

function startGame(){

socket.send(JSON.stringify({
type:"start"
}))

}

/* PLAYERS */

function renderPlayers(players){

let container=document.getElementById("playersCircle")

container.innerHTML=""

let radius=260
let center=325

players.forEach((p,i)=>{

let angle=(i/players.length)*2*Math.PI

let x=center+radius*Math.cos(angle)

let y=center+radius*Math.sin(angle)

let crown=i===0?" 👑":""

let seat=document.createElement("div")

seat.className="playerSeat"

seat.style.left=x+"px"

seat.style.top=y+"px"

seat.innerText=p+crown

container.appendChild(seat)

})

}

/* RENDER GAME */

function renderGame(data){

renderTable(data.table)

renderHand(data.hand)

if(data.pending>0){
stackAnimation("+"+data.pending)
}

}

/* TABLE */

function renderTable(card){

let el=document.getElementById("table")

el.className="card "+card.color.toLowerCase()

el.innerText=card.value

}

/* HAND */

function renderHand(cards){

let container=document.getElementById("hand")

container.innerHTML=""

let spread=35

let start=-(cards.length-1)*spread/2

cards.forEach((card,i)=>{

let div=document.createElement("div")

div.className="card "+card.color.toLowerCase()

div.innerText=card.value

let angle=start+i*spread

div.style.left=(i*40)+"px"

div.style.transform=`rotate(${angle}deg)`

div.onclick=()=>play(card,div)

container.appendChild(div)

})

}

/* PLAY */

function play(card,element){

element.classList.add("play-card")

setTimeout(()=>{

socket.send(JSON.stringify({
type:"play",
card:card
}))

},200)

}

/* STACK ANIMATION */

function stackAnimation(value){

let card=document.createElement("div")

card.className="stack-fly"

card.innerText=value

document.body.appendChild(card)

setTimeout(()=>card.remove(),600)

}

</script>

</body>
</html>
